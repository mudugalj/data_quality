# docker-compose stack for the MariaDB_Store (the DQ engine's OWN metadata /
# results database). It backs four tables — config_versions, config_store,
# source_catalog, result_store — and is DISTINCT from any `mariadb_table` data
# source the engine checks.
#
# The service runs mysql:8.0 (MySQL wire-compatible; a MariaDB image is
# interchangeable). MySQL 8.0.16+ ENFORCES the CHECK constraints declared in
# db/schema.sql, which is why the image is pinned to 8.0.
#
# Schema bootstrap: ./db/schema.sql is mounted read-only into
# /docker-entrypoint-initdb.d/. The official entrypoint runs every *.sql file
# in that directory exactly once, on FIRST startup of a fresh data volume,
# against the database named by MYSQL_DATABASE. Because the schema is applied
# only when the data volume is empty, dropping the volume re-applies it.
#
# Persistence: the data directory is backed by the named volume `dq_store_data`
# so the store survives `docker compose down` (use `down -v` to wipe it and
# force the schema to re-apply on the next `up`).

services:
  mariadb-store:
    image: mysql:8.0
    container_name: dq-mariadb-store
    # Tunables kept explicit so the engine's parameterized PreparedStatements and
    # utf8mb4 column charset (see db/schema.sql) behave consistently.
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      # NOTE: dev/local credentials only. Override via a .env file or shell
      # environment for any shared/non-local deployment.
      MYSQL_ROOT_PASSWORD: ${MARIADB_STORE_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${MARIADB_STORE_DB:-dq_store}
      MYSQL_USER: ${MARIADB_STORE_USER:-dq_engine}
      MYSQL_PASSWORD: ${MARIADB_STORE_PASSWORD:-dq_engine_pw}
    ports:
      # host:container — expose the standard MySQL port for the engine / tests.
      - "${MARIADB_STORE_PORT:-3306}:3306"
    volumes:
      # Persisted data directory (survives `docker compose down`).
      - dq_store_data:/var/lib/mysql
      # Schema bootstrap: applied once on a fresh data volume, against MYSQL_DATABASE.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      # Reports healthy once the server accepts connections, so dependent
      # tooling can wait on the init (including schema apply) completing.
      # `$$` escapes compose interpolation so the container shell expands its
      # OWN MYSQL_ROOT_PASSWORD at runtime (matches whatever was configured).
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mariadb-datasource:
    image: mysql:8.0
    container_name: dq-mariadb-datasource
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DATASOURCE_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${DATASOURCE_DB:-dq_datasource}
      MYSQL_USER: ${DATASOURCE_USER:-dq_reader}
      MYSQL_PASSWORD: ${DATASOURCE_PASSWORD:-dq_reader_pw}
    ports:
      - "${DATASOURCE_PORT:-3307}:3306"
    volumes:
      - dq_datasource_data:/var/lib/mysql
      - ./db/datasource_schema.sql:/docker-entrypoint-initdb.d/datasource_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  hive-server:
    image: apache/hive:4.0.1
    container_name: dq-hive-server
    environment:
      SERVICE_NAME: hiveserver2
      # Use embedded Derby metastore (no external DB needed for dev/testing)
      IS_RESUME: "true"
    ports:
      - "10000:10000"   # HiveServer2 JDBC
      - "10002:10002"   # HiveServer2 Web UI
    volumes:
      - hive_data:/opt/hive/data/warehouse
    healthcheck:
      test: ["CMD-SHELL", "beeline -u 'jdbc:hive2://localhost:10000/' -e 'SHOW DATABASES;' 2>&1 | grep -q 'default' && echo OK || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 60s

volumes:
  dq_store_data:
    name: dq_store_data
  dq_datasource_data:
    name: dq_datasource_data
  hive_data:
